name: Foodity CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Check Migrations
      run: |
        cd backend
        python manage.py makemigrations --check --dry-run
      continue-on-error: true
    - name: Run Tests
      run: |
        cd backend
        python manage.py test
      env:
        SECRET_KEY: 'ci-test-key-do-not-use-in-production'
        DEBUG: 'True'
        # DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT not strictly needed if tests fallback to local sqlite or mock DB

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Lint
      run: |
        cd frontend
        npm run lint
    - name: Build
      run: |
        cd frontend
        npm run build
